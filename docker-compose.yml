version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=\${OPENROUTER_API_KEY}
    volumes:
      - ./backend/prisma:/app/prisma
    depends_on:
      - redis

volumes:
  redis_data:
